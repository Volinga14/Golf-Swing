<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Guía de encaje Swing Lab</title>
  <desc id="desc">Guía simple para alinear cabeza, caderas, dirección de pies y ángulo del palo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0d201d"/>
      <stop offset="1" stop-color="#17362f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="720" height="460" fill="#071210"/>
  <rect x="36" y="34" width="648" height="392" rx="24" fill="url(#bg)" filter="url(#shadow)"/>
  <path d="M36 326c110-22 225-16 346 12 124 28 217 18 302-22v110H36Z" fill="#245d48"/>
  <path d="M122 356h430" stroke="#1a2b28" stroke-width="88" stroke-linecap="round" opacity=".75"/>
  <path d="M122 356h430" stroke="#2e7a56" stroke-width="68" stroke-linecap="round"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="318" cy="150" r="23" fill="#e8d5bc" stroke="#071210" stroke-width="5"/>
    <path d="M302 176c-32 38-43 79-36 124" stroke="#111c1a" stroke-width="26"/>
    <path d="M270 298c-34 23-50 48-62 82" stroke="#111c1a" stroke-width="21"/>
    <path d="M276 300c40 20 65 46 84 80" stroke="#111c1a" stroke-width="21"/>
    <path d="M294 209c48 23 91 48 133 78" stroke="#111c1a" stroke-width="16"/>
    <path d="M424 286l112 68" stroke="#111c1a" stroke-width="8"/>
  </g>
  <circle cx="558" cy="369" r="9" fill="#fffaf0"/>

  <g id="guide" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="248" y="124" width="142" height="174" rx="24" stroke="#fffaf0" stroke-width="5" opacity=".92"/>
    <path d="M226 124h204M226 298h204" stroke="#fffaf0" stroke-width="4" stroke-dasharray="10 10" opacity=".68"/>
    <path d="M319 124v246" stroke="#fffaf0" stroke-width="3" stroke-dasharray="8 10" opacity=".45"/>
    <path d="M142 368h442" stroke="#f2b84b" stroke-width="7"/>
    <path d="M543 366 357 190" stroke="#79addc" stroke-width="6" stroke-dasharray="15 11"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="428" y="106" width="156" height="34" rx="17" fill="#071210" opacity=".76"/>
    <text x="440" y="128" fill="#fffaf0">arriba = cabeza</text>
    <rect x="428" y="281" width="200" height="34" rx="17" fill="#071210" opacity=".76"/>
    <text x="440" y="303" fill="#fffaf0">abajo = caderas/culo</text>
    <rect x="126" y="388" width="196" height="34" rx="17" fill="#071210" opacity=".76"/>
    <text x="140" y="410" fill="#f2b84b">dirección de pies</text>
    <rect x="420" y="186" width="160" height="34" rx="17" fill="#071210" opacity=".76"/>
    <text x="432" y="208" fill="#9ec7ea">ángulo del palo</text>
  </g>
</svg>
