<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Ejemplo de guía de encuadre para swing DTL</title>
  <desc id="desc">Golfista en address con líneas de suelo, postura, plano inclinado, bola y zona de salida.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c9d9df"/>
      <stop offset="0.52" stop-color="#e7eef0"/>
      <stop offset="0.53" stop-color="#6aa06a"/>
      <stop offset="1" stop-color="#2e6a4f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#14201e" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="720" height="460" fill="#10201d"/>
  <rect x="36" y="36" width="648" height="388" rx="10" fill="url(#sky)" filter="url(#softShadow)"/>
  <path d="M36 252c96-20 155-10 232-6 91 5 154-21 416-10v188H36Z" fill="#2f7f56" opacity=".9"/>
  <path d="M128 360h395" stroke="#2b2f2f" stroke-width="16" stroke-linecap="round"/>
  <path d="M154 330h286" stroke="#1e5d49" stroke-width="86" stroke-linecap="round"/>
  <path d="M154 330h286" stroke="#2f7f56" stroke-width="70" stroke-linecap="round"/>

  <g id="golfer" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="315" cy="158" r="24" fill="#e8d5bc" stroke="#14201e" stroke-width="5"/>
    <path d="M295 185c-21 35-30 68-25 104" stroke="#1d2c2a" stroke-width="28"/>
    <path d="M273 286c-31 28-44 53-52 88" stroke="#1d2c2a" stroke-width="22"/>
    <path d="M278 288c42 18 64 42 82 82" stroke="#1d2c2a" stroke-width="22"/>
    <path d="M292 212c42 20 85 42 129 73" stroke="#1d2c2a" stroke-width="16"/>
    <path d="M420 282 512 340" stroke="#1d2c2a" stroke-width="8"/>
    <path d="M505 336c18 4 32 12 43 25" stroke="#dfe6e2" stroke-width="10"/>
  </g>

  <circle cx="541" cy="365" r="10" fill="#f2f0b6" stroke="#163832" stroke-width="3"/>
  <text x="558" y="370" fill="#fffaf0" font-family="Arial, sans-serif" font-size="17" font-weight="700">bola / salida</text>

  <g id="guide" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M126 350h460" stroke="#d7b56d" stroke-width="7"/>
    <path d="M205 316h250" stroke="#fffaf0" stroke-width="4" stroke-dasharray="13 12" opacity=".85"/>
    <path d="M292 342 500 238" stroke="#79addc" stroke-width="5" stroke-dasharray="16 12"/>
    <rect x="232" y="115" width="154" height="232" rx="48" stroke="#fffaf0" stroke-width="5" opacity=".8"/>
    <path d="M330 344V116" stroke="#fffaf0" stroke-width="4" stroke-dasharray="10 12" opacity=".55"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <text x="125" y="386" fill="#d7b56d">1. Suelo: pies/alfombra</text>
    <text x="432" y="226" fill="#9ec7ea">2. Rota la línea al plano del palo</text>
    <text x="398" y="116" fill="#fffaf0">3. Centra cuerpo y bola</text>
  </g>
</svg>
