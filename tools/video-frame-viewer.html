<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video frame viewer</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      main {
        max-width: 100vw;
        max-height: 100vh;
        display: grid;
        justify-items: center;
      }

      canvas {
        display: block;
        width: auto;
        max-width: 100vw;
        max-height: calc(100vh - 40px);
        height: auto;
        background: #000;
      }

      p {
        margin: 10px 0 0;
        font-size: 18px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="canvas"></canvas>
      <p id="label">Cargando...</p>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const src = params.get("src");
      const time = Number(params.get("t") || 0);
      const label = params.get("label") || "";
      const video = document.createElement("video");
      const canvas = document.querySelector("#canvas");
      const ctx = canvas.getContext("2d");
      const text = document.querySelector("#label");

      video.muted = true;
      video.playsInline = true;
      video.preload = "auto";
      video.src = src;

      video.addEventListener("loadedmetadata", () => {
        video.currentTime = Math.min(Math.max(0, time), video.duration || time);
      });

      video.addEventListener("seeked", () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        text.textContent = `${label} · ${time.toFixed(2)}s · ${video.videoWidth}x${video.videoHeight}`;
        document.body.dataset.ready = "true";
      });

      window.setTimeout(() => {
        if (document.body.dataset.ready) return;
        text.textContent = `No se pudo preparar el frame ${label}`;
      }, 4000);
    </script>
  </body>
</html>
